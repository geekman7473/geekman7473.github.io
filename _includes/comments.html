{%- assign g = site.giscus -%}
{%- if g and g.repo_id and g.category_id -%}
<section class="panel comments">
  <div class="titlebar">Comments</div>
  <script src="https://giscus.app/client.js"
          data-repo="{{ g.repo }}"
          data-repo-id="{{ g.repo_id }}"
          data-category="{{ g.category | default: 'General' }}"
          data-category-id="{{ g.category_id }}"
          data-mapping="{{ g.mapping | default: 'pathname' }}"
          data-strict="{{ g.strict | default: '0' }}"
          data-reactions-enabled="{{ g.reactions_enabled | default: '1' }}"
          data-emit-metadata="0"
          data-input-position="{{ g.input_position | default: 'top' }}"
          data-theme="{{ g.theme | default: 'preferred_color_scheme' }}"
          data-lang="en"
          data-loading="lazy"
          crossorigin="anonymous"
          async></script>
  <noscript class="meta">Comments require JavaScript and a GitHub account.</noscript>
</section>
{%- endif -%}
